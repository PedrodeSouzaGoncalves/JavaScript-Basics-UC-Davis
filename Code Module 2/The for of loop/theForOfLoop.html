<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The for of loop</title>
</head>
<body>
    <h1>The for of loop</h1>

    <script>

        var colors = ['red', 'blue', 'yellow', 'gree', 'orange', 'purple'];

        for(var eachColor of colors){
            console.log(eachColor);
        }

        var statement = "A string can be treated like an array";

        for (var i=0; i<statement.length; i++){
            console.log(statement[i]);
        }

    </script>
    
</body>
</html>
