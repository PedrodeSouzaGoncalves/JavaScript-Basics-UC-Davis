<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges</title>
</head>
<body>
    <h1>JavaScript Basic Challenges</h1>

    <h2>Challenge 7</h2>

    <script>
        var number = prompt("Enter a whole number", "");

        if (number <= 9){
            console.log("You entered a number smaller than 10")
            for (var i =0; i <= 9; i++){
                console.log(`Here is ${i}`);
            }
        } else if(number >= 10){
            console.log("You entered a number bigger than 10")
        }
        else{
            console.log("ERROR: You did not type a number.")
        }

    </script>
</body>
</html>
