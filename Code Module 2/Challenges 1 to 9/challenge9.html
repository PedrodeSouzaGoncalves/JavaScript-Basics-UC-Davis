<body>
    <h1>JavaScript Basic Challenges</h1>

    <h2>Challenge 9</h2>

    <script>
        var color = prompt("Enter a color", "");

        if( color === 'red' || color === 'blue' || color === 'yellow'){
            console.log(`You typed the primary color ${color}`);
        } else{
            console.log(`The color ${color}, is not a primary color.`);
        }


    </script>
