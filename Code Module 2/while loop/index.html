<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While Loop</title>
</head>
<body>
    <h1>While Loop</h1>

    <script>

        var incrementor = 0;
        var text = "";

        while(incrementor < 10){
            text += "The incrementor has gone up to " + incrementor + "\n";
            incrementor++;
        }

        console.log(text);

    </script>

    
    
</body>
</html>
