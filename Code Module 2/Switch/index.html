<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Switch</title>
</head>
<body>
    <h1>Testing switch</h1>

    <script>
        var colors = ['red','green', 'blues', 'yellow'];
        var selectedColor = colors[4];

        switch(selectedColor){
            case "red": console.log("The color is red");
            break;
            case "green": console.log("The color is green");
            break;
            case "blue": console.log("The color is blue");
            break;
            case "yellow": console.log("The color is yellow");
            break;
            default: console.log("There was an error!");
        }
    </script>
</body>
</html>
