<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Challenges</title>
</head>
<body>
    <h1>Challenge 15</h1>

    <script>

        var yourName = prompt("Provide your name: ", "");
        var foods = ["Meat", "Butter", "Olive", "Pasta"];

        function hello(name){
            var greeting;

            if(name === null || name === ""){
                greeting = "You didn't give me a name.";
            } else{
                greeting = `Hello ${name}, and welcome!`;
            }

            return greeting;
        }

        function hospitality(name, gift){
            console.log(hello (name));
            for (var i=0; i<gift.length; i++){
                console.log(`${name}, would you like some ${gift[i]}?`);
            }
        }

        hospitality(yourName, foods);



    </script>
</body>
</html>
