<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
</head>
<body>
    <h1>Functions in JavaScript</h1>

    <script>

        function name(firstName, secondName, lastName){
            var firstName = prompt("Tell me your first name: ");
            var secondName = prompt("Tell me your second name: ");
            var lastName = prompt("Tell me your last name: ");

            console.log(`Hello ${firstName} ${secondName} ${lastName}`);
        }
        // instead of giving the values in the parametes using the prompt I asked the user to provide the values 

        name();

    </script>
    
</body>
