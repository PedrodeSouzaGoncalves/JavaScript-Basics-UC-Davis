<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using &&</title>
</head>
<body>
    <h1>Using &&</h1>

    <script>

        var goodMood = true;
        var gotSleep = true;

        if (goodMood && gotSleep){
            console.log("Today is a good day");
        }
        else {
            console.log("I am grumpy!");
        }

    </script>
</body>
</html>
