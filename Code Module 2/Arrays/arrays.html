<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Looping an Array</title>
</head>
<body>
    <h1>Looping in Array</h1>

    <script>

        var colors = ['red', 'blue', 'yellow', 'green'];

        for(var i = 0; i < 4; i++){ // usign colors.length i<colors.length it will work with more colors no matter what
            console.log(colors[i]); 
        }

    </script>
    
</body>
