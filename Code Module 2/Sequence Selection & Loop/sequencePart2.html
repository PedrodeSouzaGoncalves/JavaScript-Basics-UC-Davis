<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Part 2</title>
</head>
<body>
    <h1>Sequence Part 2</h1>

    <script>

        var myString = "I am really hungry for some";
        console.log(myString);

        var myUpperString = myString.toUpperCase();
        console.log(myUpperString);

        var reallyLocation = myString.search('really');
        console.log(reallyLocation); // it will show you where it starts, at location 5

        var specialWord = myString.substr(reallyLocation, 6);
        console.log(specialWord);// using var reallyLocation as start point and adding 6 letters

        specialWord = specialWord.toUpperCase(); // only the value inside specialWord, really
        console.log(specialWord);

        var newString = myString.replace('really', specialWord);
        console.log(newString);

    </script>
    
</body>
</html>
